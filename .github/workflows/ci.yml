name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Set up MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://cli.moonbitlang.com/install/powershell.ps1 -OutFile install.ps1
          & .\install.ps1
          "$env:USERPROFILE\.moon\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Remove MinGW from PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $newPath = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'mingw' }) -join ';'
          "PATH=$newPath" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Show tool versions
        run: moon version --all

      - name: Install dependencies
        run: moon update

      - name: Format check
        run: moon fmt --check

      - name: Check
        run: moon check --target native

      - name: Test
        run: moon test --target native
